name: Benchmark

# Compares bbb (this repo) upload/download throughput against azcopy and
# boostedblob (py-bbb) using the Azurite emulator, so it needs no secrets and
# runs on every pull request and push to main (plus on demand and weekly).
#
# py-bbb hardcodes https://{account}.blob.core.windows.net, so setup-emulator.sh
# serves Azurite at that host over TLS on port 443 (see internal/benchmark).

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      size_mb:
        description: Test file size in MiB
        default: "256"
        required: false
      runs:
        description: Timed runs per tool/direction
        default: "3"
        required: false
      fail_factor:
        description: Fail if bbb is slower than the fastest other tool by this factor (blank = report only)
        default: ""
        required: false
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: true

      - name: Build bbb
        run: go build -o "${RUNNER_TEMP}/bbb" .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install py-bbb (boostedblob)
        run: pip install boostedblob

      - name: Install azcopy
        run: |
          curl -sSL -o /tmp/azcopy.tar.gz https://aka.ms/downloadazcopy-v10-linux
          tar -xzf /tmp/azcopy.tar.gz -C /tmp
          sudo cp /tmp/azcopy_linux_amd64_*/azcopy /usr/local/bin/azcopy
          azcopy --version

      - name: Install Azurite
        run: npm install -g azurite

      - name: Start Azurite emulator
        run: |
          BENCH_STATE_DIR="${RUNNER_TEMP}/azurite" bash internal/benchmark/setup-emulator.sh

      - name: Run benchmark
        env:
          BENCH_SIZE_MB: ${{ github.event.inputs.size_mb || '256' }}
          BENCH_RUNS: ${{ github.event.inputs.runs || '3' }}
          BENCH_FAIL_FACTOR: ${{ github.event.inputs.fail_factor || '' }}
          BBB_BIN: ${{ runner.temp }}/bbb
        run: bash internal/benchmark/benchmark.sh
