name: Benchmark

# Compares bbb (this repo) upload/download throughput against azcopy and
# boostedblob (py-bbb) using the Azurite emulator, so it needs no secrets and
# runs on every pull request and push to main (plus on demand and weekly).
#
# Everything runs inside Docker Compose (internal/benchmark), mirroring the E2E
# suite: a single container builds bbb, serves Azurite behind the production-style
# https://{account}.blob.core.windows.net host that py-bbb hardcodes, and runs
# all three tools against it.

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      size_mb:
        # Kept small: the emulator is CPU/loopback-bound, so larger files mainly
        # add runtime without changing the comparison.
        description: Test file size in MiB
        default: "256"
        required: false
      runs:
        description: Timed runs per tool/direction
        default: "3"
        required: false
      fail_factor:
        description: Fail if bbb is slower than the fastest other tool by this factor (blank = report only)
        default: ""
        required: false
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run benchmark
        run: docker compose up --build --abort-on-container-exit --exit-code-from benchmark
        working-directory: internal/benchmark
        env:
          COMPOSE_DOCKER_CLI_BUILD: "1"
          DOCKER_BUILDKIT: "1"
          BENCH_SIZE_MB: ${{ github.event.inputs.size_mb || '256' }}
          BENCH_RUNS: ${{ github.event.inputs.runs || '3' }}
          BENCH_FAIL_FACTOR: ${{ github.event.inputs.fail_factor || '' }}

      - name: Publish results to job summary
        if: always()
        run: |
          if [ -f internal/benchmark/.benchmark-summary.md ]; then
            cat internal/benchmark/.benchmark-summary.md >> "${GITHUB_STEP_SUMMARY}"
          fi
